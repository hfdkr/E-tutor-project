<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Tutor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <style type="text/tailwindcss">
        @theme{
             --color-dark-gray: #1D2026;
             --color-gray-black: #8C94A3;
             --color-gray-white: #FFFFFF;
             --color-gray:#E9EAF0;
             --color-black: #1D2026;
             --color-oronge-primary: #FFEEE8;
             --color-oronge: #FF6636;
             --color-gray-700: #4E5566;
             --color-oronge-700: #993D20;
             --color-secondary: #EBEBFF;   
             --color-success: #E1F7E3;
             --color-warning: #FFF2E5;
             --color-error: #FFF0F0; 
             --color-gray-50: #F5F7FA;
             --color-warning-800: #65390C;
             --color-gray-400: #A1A5B3;
             --color-blue: #342F98;
             --color-green: #882929;
             /* fonts */
              --font-inter: "Inter", sans-serif;
            /* text size */
            --text-4xl: 40px;
            --text-4xl-line-height: 48px;
            --text-3xl: 32px;
            --text-3xl-line-height: 124%;
            --text-base:16px;
            --text-base-line-height: 48px;
            --text-7xl:72px;
            --text-7xl-line-height: 74px; 
            --text-2xl: 24px;
            --text-2xl-line-height: 32px;
            --text-xs:10px;
            --text-xs-line-height: 12px;
            --text-xl: 32px;
            --text-xl-line-height: 40px;
             
        }
         .div-hero{
            @apply flex justify-between bg-dark-gray text-white
        }
        .nav{
            @apply flex gap-[8px] text-gray-black font-inter font-medium text-sm pl-[32px]
        }
        .home-1{
            @apply text-gray-white p-[16px]
        }
        header{
            @apply px-[32px] my-[24px] flex justify-between
        }
        .div-bar{
            @apply flex px-[32px] text-gray-black font-normal text-sm
        }
        .div-header{
            @apply flex items-center justify-between gap-[16px]
        }
        .button{
            @apply  px-[24px] h-[48px] text-base font-semibold tracking-[-0.8%] font-inter
        }
        .div-input{
            @apply flex items-center gap-[40px] 
        }
        .h1{
            @apply text-3xl font-semibold tracking-[-3%] text-black font-inter pl-[8px] pr-[50px]
        }
        .h5{
            @apply text-[16px] font-inter text-dark-gray leading-[22px] font-medium
            }
        .span{
            @apply text-dark-gray text-[14px] leading-[20px] font-medium px-[12px] py-[6px] tracking-[-1%] font-inter whitespace-nowrap
        }
        .span-1{
          @apply text-oronge text-[14px] leading-[20px] font-medium px-[12px] py-[6px] tracking-[-1%] font-inter whitespace-nowrap
        }   
    </style>
</head>

<body>
    <div class="div-hero">
        <nav class="nav">
            <a href="#Home" class="home-1 focus:border-t-2 focus:border-orange-500">Home</a>
            <a href="#Courses" class="p-[16px]  focus:border-t-2 focus:border-orange-500">Courses</a>
            <a href="#About" class="p-[16px] focus:border-t-2 focus:border-orange-500">About</a>
            <a href="#Contact" class="p-[16px] focus:border-t-2 focus:border-orange-500">Contact</a>
            <a href="#Instructor" class="p-[16px] focus:border-t-2 focus:border-orange-500">Become an Instructor</a>
        </nav>
        <div class="div-bar">
            <div class="flex gap-[6px] p-[16px] hover:bg-gray hover:text-oronge">
                <span>USD</span>
                <span class="mt-[10px]">
                    <img src="./images/Vector(1).png" alt="drop-down">
                </span>
            </div>
            <div class="flex gap-[6px] p-[16px] hover:bg-gray hover:text-oronge">
                <span>English</span>
                <span class="mt-[10px]">
                    <img src="./images/Vector(1).png" alt="drop-down">
                </span>
            </div>
        </div>
    </div>
    <header class="header">
        <div class="div-header">
            <div class="flex items-center">
                <img src="./images/logo.png" alt="Logo">
                <h1 class="h1">E-tutor</h1>
            </div>
            <div class="div-input">
                <div class="relative w-[200px]">
                    <!-- Input -->
                    <input type="text" value="Browse" readonly
                        class="border border-gray bg-gray-white h-[48px] px-5 py-[12px] text-gray-600 cursor-pointer" />
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 ">
                        <img src="./images/Vector(1).png" alt="Vector">
                    </span>
                </div>
                <div class="flex gap-8">
                    <div class="relative">
                        <img src="./images/Searsh.png" alt="img-searsh"
                            class="absolute left-3 top-1/2 -translate-y-1/2 w-[18px] h-[17px]" />
                        <!-- Input -->
                        <input type="text" placeholder="What do you want learn..."
                            class="radius-[6px] w-[424px] h-[48px] border  border-gray py-2 pl-10 pr-3" />
                    </div>
                </div>
            </div>
        </div>
        <div class="flex justify-between items-center gap-[24px]">
            <div class="flex gap-[24px]">
                <img src="./images/icon-1.png" class="w-[24px] h-[24px]" alt="icon-1">
                <img src="./images/icon-2.png" class="w-[24px] h-[24px]" alt="icon-2">
                <img src="./images/icon-3.png" class="w-[24px] h-[24px]" alt="icon-3">
            </div>
            <div class="flex gap-[12px]">
                <button class="button bg-oronge-primary text-oronge hover:bg-gray hover:text-oronge hover:cursor-pointer">Create
                    Account</button>
                <button class="button bg-oronge text-gray-white hover:bg-gray hover:text-oronge hover:cursor-pointer">Sign In</button>
            </div>
        </div>
    </header>
